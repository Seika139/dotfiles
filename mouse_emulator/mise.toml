[tools]
python = "3.11.6"
uv = "latest"

#################################
# Environments and Dependencies #
#################################

[tasks.venv]
description = "uvを利用して仮想環境を作成します。ある場合はスキップされます"
shell = "bash -c"
quiet = true
run = '''
if [ ! -d "{{config_root}}/.venv" ]; then
  echo "Creating .venv ..."
  uv venv --clear
fi
'''

[tasks.reset-venv]
description = "仮想環境をリセットします"
shell = "bash -c"
quiet = true
run = '''
echo "Resetting .venv ..."
venv_dir="{{config_root}}/.venv"
if [ -d "$venv_dir" ]; then
  echo "Removing existing .venv ...";
  chmod -R +w "$venv_dir" 2>/dev/null || true;
  find "$venv_dir" -type l -delete 2>/dev/null || true;
  find "$venv_dir" -type f -exec chmod +w {} \; 2>/dev/null || true;
  rm -rf "$venv_dir" 2>/dev/null || sudo rm -rf "$venv_dir" || true;
fi
uv venv --clear
echo "done. Run 'mise run resolve' to sync dependencies."
'''

[tasks.resolve]
description = "依存関係を解決します"
shell = "bash -c"
quiet = true
depends = ["venv"]
run = '''
if [ -d "{{config_root}}/.venv" ] \
  && [ ! -f "{{config_root}}/.venv/bin/python" ] \
  && [ ! -f "{{config_root}}/.venv/Scripts/python.exe" ]; then
  echo "virtual environment is broken. Recreating..."
  mise run reset-venv
fi

uv lock
uv sync

printf "✅ Dependencies are resolved.\n"
'''

[tasks.upgrade]
description = "依存関係を最新のバージョンにアップグレードします"
shell = "bash -c"
quiet = true
depends = ["venv"]
run = 'uv sync --upgrade'

################
# Code Quality #
################

[tasks.check]
description = "コードの静的解析とテストを実行します"
shell = "bash -c"
quiet = true
run = '''
printf "\033[33m%s\033[0m\n" "Running ruff check..."
uv run ruff check .
printf "\033[33m%s\033[0m\n" "Running mypy..."
uv run mypy .
printf "\033[33m%s\033[0m\n" "Running pytest..."
uv run pytest tests/
'''

[tasks.format]
description = "コードのフォーマットを実行します"
shell = "bash -c"
quiet = true
run = '''
printf "\033[33m%s\033[0m\n" "Running ruff format..."
uv run ruff format .
printf "\033[33m%s\033[0m\n" "Running ruff check --fix..."
uv run ruff check . --fix
'''

[tasks.ruff-clean]
description = "Ruffのキャッシュをクリアします"
shell = "bash -c"
quiet = true
run = '''
printf "\033[33m%s\033[0m\n" "Clearing ruff cache..."
uv run ruff cache clear
'''

########################
# Mouse Emulator Tasks #
########################

[tasks.register]
description = "マウスエミュレーターのプロファイルを作成します"
shell = "bash -c"
quiet = true
depends = ["venv"]
usage = '''
flag "--prof <profile_name>" help="プロファイル名を指定します (省略時は 'default')" default="default"
'''
run = '''
# PY_BIN="{{config_root}}/.venv/bin/python"
# "$PY_BIN" -m mouse_emulator register "${usage_prof?}"
uv run python -m mouse_emulator register "${usage_prof?}"
'''

[tasks.emulate]
description = "マウスエミュレーターを実行します"
shell = "bash -c"
quiet = true
depends = ["venv"]
usage = '''
flag "--prof <profile_name>" help="プロファイル名を指定します (省略時は 'default')" default="default"
'''
run = '''
echo "mise --log-level trace run emulate とすると詳細なログが見られます"
uv run python -m mouse_emulator emulate "${usage_prof?}"
'''

#######################
# Auto Emulator Tasks #
#######################

[tasks.auto-validate]
description = "自動エミュレーターの設定ファイルを検証します --config <設定ファイルパス>"
shell = "bash -c"
quiet = true
depends = ["venv"]
usage = '''
flag "--config <file>" {
  help "プロファイル名を指定します"
  default "profiles/auto_emulator/sample2.yml"
}
'''
run = ["uv run python -m auto_emulator validate ${usage_config?}"]

[tasks.auto-run]
description = "自動エミュレーターを実行します --config <設定ファイルパス>"
shell = "bash -c"
quiet = true
depends = ["venv"]
usage = '''
flag "--config <file>" {
  help "プロファイル名を指定します"
  default "profiles/auto_emulator/sample2.yml"
}
'''
run = ["uv run python -m auto_emulator run ${usage_config?}"]

[tasks.auto-dodge]
description = "障害物回避ゲーム用エンジンを実行します --config <設定ファイルパス>"
shell = "bash -c"
quiet = true
depends = ["venv"]
usage = '''
flag "--config <file>" {
  help "プロファイル名を指定します"
  default "profiles/auto_emulator/sample2.yml"
}
'''
run = ["uv run python -m auto_emulator dodge ${usage_config?}"]

[tasks.produce-auto]
description = "シャニマス プロデュース自走ループを起動します (E1: yml なし Engine 一本化)"
shell = "bash -c"
quiet = true
depends = ["venv"]
usage = '''
arg "[args]" var=#true help="produce-run に渡す追加引数 (例: --max-turns 1 --no-log)"
'''
run = '''
eval "args=(${usage_args:-})"
uv run python -m auto_emulator produce-run "${args[@]}"
'''

[tasks.probe]
description = "キャリブレーション後に相対座標をプローブします"
shell = "bash -c"
quiet = true
depends = ["venv"]
usage = '''
flag "--interval <seconds>" {
  help "プローブ間隔を指定します"
  default "0.5"
}
flag "--mode <mode>" {
  help "プローブモードを指定します"
  default "click"
}
'''
run = '''
uv run python -m auto_emulator probe --interval ${usage_interval} --mode ${usage_mode}
'''
