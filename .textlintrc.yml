rules:
  preset-ja-technical-writing:
    ja-no-mixed-period: false
    ja-no-redundant-expression: false
    ja-no-successive-word: false
    max-kanji-continuous-len: false
    no-doubled-joshi: false
    no-exclamation-question-mark: false
    no-mix-dearu-desumasu: false
    no-unmatched-pair: false
    sentence-length: false
    no-doubled-conjunction: false
    max-comma: false
    max-ten: false
  preset-jtf-style:
    1.1.3.箇条書き: false
    3.1.1.全角文字と半角文字の間: false
    4.1.1.句点(。): false
    4.2.7.コロン(：): false
    2.1.8.算用数字: false
    2.2.3.一部の助数詞の表記: false
    4.3.1.丸かっこ（）: false
    4.3.5.二重引用符: false
    4.2.1.感嘆符(！): false
    1.2.1.句点(。)と読点(、): false
    3.1.2.全角文字どうし: false
    4.3.2.大かっこ［］: false
    3.3.かっこ類と隣接する文字の間のスペースの有無: false
    4.3.7.山かっこ<>: false
    4.3.3.かぎかっこ「」: false
    4.1.3.ピリオド(.)、カンマ(,): false
    4.2.6.ハイフン(-): false
    1.1.1.本文: false
