model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
service_tier = "default"
notify = [
  "bash",
  "-lc",
  "CODEX_NOTIFY_CHANNEL=slack CODEX_NOTIFY_DEBUG_LOG=\"$HOME/dotfiles/codex/profiles/wsl-ubuntu/notify.log\" exec \"$HOME/dotfiles/codex/notify.sh\" \"$@\"",
  "codex-notify",
]

[agents]
max_threads = 4
max_depth = 1

[tui]
notifications = ["agent-turn-complete", "approval-requested"]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "project-name",
  "git-branch",
  "pull-request-number",
  "branch-changes",
  "run-state",
  "permissions",
  "approval-mode",
  "context-used",
  "context-window-size",
  "used-tokens",
  "task-progress",
  "thread-title",
  "total-input-tokens",
  "total-output-tokens",
]
status_line_use_colors = true

[features]

[features.multi_agent_v2]
hide_spawn_agent_metadata = false
tool_namespace = "agents"
