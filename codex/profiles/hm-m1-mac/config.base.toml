model = "gpt-5.5"
model_reasoning_effort = "medium"
hide_agent_reasoning = true
network_access = true

# Native Codex agent の並列実行制限。
[agents]
max_threads = 4
max_depth = 1

[tui]
notifications = ["agent-turn-complete", "approval-requested"]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "project-name",
  "git-branch",
  "pull-request-number",
  "branch-changes",
  "run-state",
  "permissions",
  "approval-mode",
  "context-used",
  "context-window-size",
  "used-tokens",
  "task-progress",
]
status_line_use_colors = true

[tools]
web_search = true

[features]

[features.multi_agent_v2]
hide_spawn_agent_metadata = false
tool_namespace = "agents"
