model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
hide_agent_reasoning = true
network_access = true

[agents]
max_threads = 4
max_depth = 1

[tui]
notifications = ["agent-turn-complete", "approval-requested"]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "project-name",
  "git-branch",
  "pull-request-number",
  "branch-changes",
  "run-state",
  "permissions",
  "approval-mode",
  "context-used",
  "context-window-size",
  "used-tokens",
  "task-progress",
]
status_line_use_colors = true

[sandbox_workspace_write]
network_access = true
