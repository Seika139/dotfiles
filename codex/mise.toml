[env]
PROFILES_DIR = "profiles"
# WSL 環境なら true になる
# exec() はバージョン間で挙動が不安定なため read_file + containing で判定する
# Tera の is テストは変数にしか使えないため set で一旦変数に入れる
# {%- -%} で空白・改行を除去して "true" / "false" のみが値になるようにする
IS_WSL = '''
{%- set proc = "/proc/version" -%}
{%- if os() == "linux" and proc is file -%}
  {%- set content = read_file(path="/proc/version") -%}
  {%- if content is containing("microsoft") -%}
    true
  {%- else -%}
    false
  {%- endif -%}
{%- else -%}
  false
{%- endif -%}
'''

[tasks.check_env]
description = "環境変数がちゃんと設定されているか確認する"
quiet = true
hide = true
shell = "bash -c"
run = '''
chmod +x "{{config_root}}/mise/scripts/check_env.sh"
bash "{{config_root}}/mise/scripts/check_env.sh"
'''

[tasks.check]
description = "指定プロファイルが存在するかを確認し、なければエラーを返す"
depends = ["check_env"]
hide = true
quiet = true
shell = "bash -c"
run = """
if [ "$IS_WSL" = "true" ]; then
  DEFAULT_PROFILE="${WSL_CODEX_PROFILE:-}"
else
  DEFAULT_PROFILE="${DEFAULT_CODEX_PROFILE:-}"
fi
PROFILE=$([ -n "{{option(name="prof")}}" ] && echo "{{option(name="prof")}}" || echo "$DEFAULT_PROFILE")
printf "Using profile: \\033[36m%s\\033[0m\n" "$PROFILE"
if [ -z "$PROFILE" ]; then
  printf "❌ Error: DEFAULT_CODEX_PROFILE is not set in environment variables\n" >&2
  exit 1
fi

PROFILE_PATH="{{config_root}}/$PROFILES_DIR/$PROFILE"

if [ ! -d "$PROFILE_PATH" ]; then
  {
    printf "❌ Error: Profile directory '$PROFILE_PATH' does not exist\n"
    printf "   Available profiles:\n"
    if [ -d "{{config_root}}/$PROFILES_DIR" ]; then
      ls -1 "{{config_root}}/$PROFILES_DIR" | sed 's/^/   - /'
    else
      printf "   (No profiles directory found)\n"
    fi
  } >&2
  exit 1
fi
"""

[tasks.create_profile]
description = "新しいプロファイルを作成 (Usage: mise run create_profile <profile-name>)"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
PROFILE={{arg(name="prof")}}
if [ -z "$PROFILE" ]; then
  {
    printf "❌ Error: profile name is required.\n"
    printf "   Usage: mise run create_profile <profile-name>\n"
  } >&2
  exit 1
fi

PROFILE_PATH="{{config_root}}/$PROFILES_DIR/$PROFILE"
if [ -d "$PROFILE_PATH" ]; then
  printf "❌ Error: Profile '$PROFILE' already exists\n" >&2
  exit 1
fi

printf "🦄 Creating new Codex profile: $PROFILE\n"
mkdir -p "$PROFILE_PATH"

# デフォルト設定ファイル作成
cat > "$PROFILE_PATH/config.base.toml" << 'EOF'
model = "gpt-5.1-codex"
model_reasoning_effort = "high"
hide_agent_reasoning = true
network_access = true

[features]
web_search_request = true

EOF

cat > "$PROFILE_PATH/AGENTS.md" << 'EOF'
# Instructions for this Profile

## Project Context
<!-- Describe the type of projects this profile is used for -->

## Preferred Tools and Libraries
<!-- List commonly used tools, frameworks, or libraries for this environment -->

## Code Style Guidelines
<!-- Specify any coding standards or preferences -->

## Environment-Specific Notes
<!-- Add any machine-specific or environment-specific instructions -->

## Restrictions
<!-- Note any specific restrictions or security considerations -->
EOF

mkdir -p "$PROFILE_PATH/prompts"
mkdir -p "$PROFILE_PATH/custom-config"
mkdir -p "$PROFILE_PATH/skills"

printf "%s\n" "✅ Created profile '$PROFILE' at $PROFILE_PATH"
printf "%s\n" "📝 Edit settings in:"
printf "%s\n" "   - $PROFILE_PATH/config.base.toml"
printf "%s\n" "   - $PROFILE_PATH/config.local.toml (optional, git-ignored)"
printf "%s\n" "   - $PROFILE_PATH/AGENTS.md"
printf "%s\n" "   - $PROFILE_PATH/prompts/"
printf "%s\n" "   - $PROFILE_PATH/custom-config/"
printf "%s\n" "   - $PROFILE_PATH/skills/"
"""

[tasks.link]
description = "指定プロファイルの設定ファイルを~/.codexへ反映する"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = '''
chmod +x "{{config_root}}/mise/scripts/link.sh"
bash "{{config_root}}/mise/scripts/link.sh" {{option(name="prof", default="")}}
'''

[tasks.pull_config]
description = "現在の~/.codex/config.tomlをプロファイルのconfig.local.tomlへ取り込む"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = '''
chmod +x "{{config_root}}/mise/scripts/pull_config.sh"
bash "{{config_root}}/mise/scripts/pull_config.sh" {{option(name="prof", default="")}}
'''

[tasks.sync_prompt_skills]
description = "profile promptsをCodex command skillへ変換する"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = '''
if [ "$IS_WSL" = "true" ]; then
  DEFAULT_PROFILE="${WSL_CODEX_PROFILE:-}"
else
  DEFAULT_PROFILE="${DEFAULT_CODEX_PROFILE:-}"
fi
PROFILE=$([ -n "{{option(name="prof")}}" ] && echo "{{option(name="prof")}}" || echo "$DEFAULT_PROFILE")
if [ -z "$PROFILE" ]; then
  printf "❌ Error: profile is not set\n" >&2
  exit 1
fi
PROFILE_PATH="{{config_root}}/$PROFILES_DIR/$PROFILE"
if [ ! -d "$PROFILE_PATH" ]; then
  printf "❌ Error: Profile directory does not exist: %s\n" "$PROFILE_PATH" >&2
  exit 1
fi
python3 "{{config_root}}/mise/scripts/sync_prompt_skills.py" --profile-path "$PROFILE_PATH"
'''

[tasks.status]
description = "現在のプロファイル設定と~/.codexの状態を確認"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
if [ "$IS_WSL" = "true" ]; then
  DEFAULT_PROFILE="${WSL_CODEX_PROFILE:-}"
else
  DEFAULT_PROFILE="${DEFAULT_CODEX_PROFILE:-}"
fi
PROFILE=$([ -n "{{option(name="prof")}}" ] && echo "{{option(name="prof")}}" || echo "$DEFAULT_PROFILE")

PROFILE_PATH="{{config_root}}/$PROFILES_DIR/$PROFILE"

printf "%s\n" "🦄 Environment Check"
printf "os()                 =\\033[36m %s\\033[0m\n" "{{ os() }}"
printf "IS_WSL               =\\033[36m %s\\033[0m\n" "$IS_WSL"
printf "config_root          =\\033[36m %s\\033[0m\n" "{{ config_root }}"
printf "Selected profile     =\\033[36m %s\\033[0m\n" "$PROFILE"

if [ ! -d "$PROFILE_PATH" ]; then
  printf "❌ Profile directory does not exist:\\033[36m %s\\033[0m\n" "$PROFILE_PATH"
  exit 1
fi

printf "\n📂 Original files and directories:\n"
for file in AGENTS.md prompts custom-config skills; do
  source="$PROFILE_PATH/$file"
  if [ -f "$source" ] || [ -d "$source" ]; then
    printf "%s\n" "   ✅ $source"
  else
    printf "\\033[31m%s\\033[0m\n" "   ❌ $source (missing)"
  fi
done

printf "\n⚙️ Config sources:\n"
for file in config.base.toml config.local.toml config.toml; do
  source="$PROFILE_PATH/$file"
  if [ -f "$source" ]; then
    if [ "$file" = "config.local.toml" ]; then
      printf "%s\n" "   ✅ $source (git-ignored local/private)"
    elif [ "$file" = "config.toml" ] && [ -f "$PROFILE_PATH/config.base.toml" ]; then
      printf "%s\n" "   ⚠️  $source (legacy; ignored because config.base.toml exists)"
    else
      printf "%s\n" "   ✅ $source"
    fi
  elif [ "$file" = "config.local.toml" ]; then
    printf "%s\n" "   ⭕ $source (optional)"
  elif [ "$file" = "config.toml" ] && [ -f "$PROFILE_PATH/config.base.toml" ]; then
    printf "%s\n" "   ⭕ $source (legacy optional)"
  else
    printf "\\033[33m%s\\033[0m\n" "   ❌ $source (missing)"
  fi
done

printf "\n⚙️ Runtime config in\\033[36m %s/.codex:\\033[0m\n" "$HOME"
config_target="${HOME}/.codex/config.toml"
if [ -f "$PROFILE_PATH/config.base.toml" ] || [ -f "$PROFILE_PATH/config.toml" ] || [ -f "$PROFILE_PATH/config.local.toml" ]; then
  tmp_config="$(mktemp)"
  if python3 "{{config_root}}/mise/scripts/render_config.py" --profile-path "$PROFILE_PATH" --output "$tmp_config"; then
    if [ -L "$config_target" ]; then
      printf "%s\n" "   ⚠️  $config_target is still a symlink. Run: mise run link --prof \"$PROFILE\""
    elif [ -f "$config_target" ]; then
      if python3 "{{config_root}}/mise/scripts/render_config.py" --profile-path "$PROFILE_PATH" --same-as "$config_target"; then
        printf "%s\n" "   ✅ $config_target matches rendered profile config"
      else
        printf "%s\n" "   ⚠️  $config_target differs from rendered profile config"
        printf "\\033[36m%s\\033[0m\n" "         import runtime changes: mise run pull_config --prof \"$PROFILE\""
        printf "\\033[36m%s\\033[0m\n" "         re-render profile config: mise run link --prof \"$PROFILE\""
      fi
    else
      printf "\\033[33m%s\\033[0m\n" "   ❌ $config_target does not exist. Run: mise run link --prof \"$PROFILE\""
    fi
  else
    printf "\\033[31m%s\\033[0m\n" "   ❌ Failed to render profile config"
  fi
  rm -f "$tmp_config"
else
  printf "%s\n" "   ⚠️  No config sources in profile; existing $config_target is left untouched"
fi

printf "\n🔗 Symlinks in\\033[36m %s/.codex:\\033[0m\n" "$HOME"
for file in AGENTS.md prompts custom-config; do
  target="${HOME}/.codex/$file"
  source="$PROFILE_PATH/$file"

  if [ ! -f "$source" ] && [ ! -d "$source" ]; then
    if [ -e "$target" ]; then
      printf "%s\n" "   ⚠️  $source (missing); existing $target is left untouched"
    else
      printf "\\033[33m%s\\033[0m\n" "   ❌ $target does not exist"
    fi
    continue
  fi

  if [ -L "$target" ]; then
    link_target=$(readlink "$target")
    source_real=$(realpath -m "$source")
    target_real=$(realpath -m "$target")
    if [ "$target_real" = "$source_real" ]; then
      printf "%s\n" "   ✅ $source -> $link_target"
    else
      printf "%s\n" "   ⚠️  $source -> $link_target (不一致)"
    fi
  elif [ -f "$target" ]; then
    printf "%s\n" "   ❌ $file (通常ファイル、シンボリックリンクではない). Use the following command ↓"
    printf "\\033[36m%s\\033[0m\n" "         code '$source' '$target'"
  else
    printf "\\033[33m%s\\033[0m\n" "   ❌ $target does not exist"
  fi
done

printf "\n🧩 Profile skill symlinks in\\033[36m %s/.codex/skills:\\033[0m\n" "$HOME"
if [ -d "$PROFILE_PATH/skills" ]; then
  found_skill=false
  for source in "$PROFILE_PATH/skills"/*; do
    [ -d "$source" ] || continue
    [ -f "$source/SKILL.md" ] || continue
    found_skill=true
    skill_name=$(basename "$source")
    target="${HOME}/.codex/skills/$skill_name"

    if [ -L "$target" ]; then
      link_target=$(readlink "$target")
      if [ "$link_target" = "$source" ]; then
        printf "%s\n" "   ✅ $source -> $link_target"
      else
        printf "%s\n" "   ⚠️  $source -> $link_target (不一致)"
      fi
    elif [ -e "$target" ]; then
      printf "%s\n" "   ⚠️  $target exists but is not a profile symlink"
    else
      printf "\\033[33m%s\\033[0m\n" "   ❌ $target does not exist"
    fi
  done
  if [ "$found_skill" = "false" ]; then
    printf "%s\n" "   (No profile skills found)"
  fi
else
  printf "%s\n" "   (No skills directory found)"
fi

printf "%s\n" "\n💡 Commands:"
printf "%s\n" "   反映/更新: mise run link --prof \"$PROFILE\""
printf "%s\n" "   Codexが書いたconfigを取り込み: mise run pull_config --prof \"$PROFILE\""
printf "%s\n" "   プロファイル変更: mise run switch [--prof <profile-name>]"
"""

[tasks.switch]
description = "プロファイルを切り替えてシンボリックリンクを更新 (Usage: mise run switch [--prof <profile-name>])"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
NEW_PROFILE="{{option(name="prof")}}"
if [ -z "$NEW_PROFILE" ]; then
  PROFILES_PATH="{{config_root}}/$PROFILES_DIR"
  if [ ! -d "$PROFILES_PATH" ] || [ -z "$(ls -A "$PROFILES_PATH" 2>/dev/null)" ]; then
    printf "%s\n" "❌ Error: No profiles found in $PROFILES_PATH" >&2
    exit 1
  fi
  if command -v fzf &>/dev/null && [ -t 0 ]; then
    NEW_PROFILE=$(ls -1 "$PROFILES_PATH" | fzf --prompt="Select Codex profile: " --height=~50% --reverse)
    if [ -z "$NEW_PROFILE" ]; then
      printf "%s\n" "❌ cancelled."
      exit 1
    fi
  else
    {
      printf "%s\n" "❌ Error: profile name is required."
      printf "%s\n" "   Usage: mise run switch --prof <profile-name>"
      printf "%s\n" "   Available profiles:"
      ls -1 "$PROFILES_PATH" | sed 's/^/     - /'
    } >&2
    exit 1
  fi
fi

# プロファイル存在確認
mise run check --prof "$NEW_PROFILE"

# WSL か否かに応じて mise.local.toml の適切な環境変数を更新
LOCAL_CONFIG="{{config_root}}/mise.local.toml"
if [ "$IS_WSL" = "true" ]; then
  {
    printf "%s\n" '[env]'
    printf "%s\n" "DEFAULT_CODEX_PROFILE = \\\"${DEFAULT_CODEX_PROFILE:-}\\\""
    printf "%s\n" "WSL_CODEX_PROFILE = \\\"$NEW_PROFILE\\\""
  } > "$LOCAL_CONFIG"
else
  {
    printf "%s\n" '[env]'
    printf "%s\n" "DEFAULT_CODEX_PROFILE = \\\"$NEW_PROFILE\\\""
    printf "%s\n" "WSL_CODEX_PROFILE = \\\"${WSL_CODEX_PROFILE:-}\\\""
  } > "$LOCAL_CONFIG"
fi

printf "%s\n" "🦄 Switching Codex profile to: $NEW_PROFILE"

# シンボリックリンクを更新
mise run link --prof "$NEW_PROFILE"

printf "%s\n" "✅ Switched to profile '$NEW_PROFILE'"
printf "%s\n" "🔄 Please restart your shell or run 'mise env' to reload environment variables"
"""

[tasks.list]
description = "利用可能なプロファイル一覧を表示"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
PROFILES_DIR="{{config_root}}/$PROFILES_DIR"

if [ "$IS_WSL" = "true" ]; then
  CURRENT_PROFILE="${WSL_CODEX_PROFILE:-}"
else
  CURRENT_PROFILE="${DEFAULT_CODEX_PROFILE:-}"
fi

printf "%s\n" "🦄 Available Codex Profiles:"
if [ -d "$PROFILES_DIR" ]; then
  for profile in "$PROFILES_DIR"/*; do
    if [ -d "$profile" ]; then
      profile_name=$(basename "$profile")
      if [ "$profile_name" = "$CURRENT_PROFILE" ]; then
        printf "%s\n" "   ✅ $profile_name (current)"
      else
        printf "%s\n" "   ⭕ $profile_name"
      fi
    fi
  done
else
  printf "%s\n" "   (No profiles found)"
fi

if [ -n "$CURRENT_PROFILE" ]; then
  printf "\nCurrent profile:\\033[36m %s\\033[0m\n" "$CURRENT_PROFILE"
else
  printf "%s\n" "\n⚠️ No current profile set in DEFAULT_CODEX_PROFILE"
fi
"""
