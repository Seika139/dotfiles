[tools]
jq = "latest"

[env]
PROFILES_DIR = "profiles"
# WSL 環境なら true になる
# exec() はバージョン間で挙動が不安定なため read_file + containing で判定する
# Tera の is テストは変数にしか使えないため set で一旦変数に入れる
# {%- -%} で空白・改行を除去して "true" / "false" のみが値になるようにする
IS_WSL = '''
{%- set proc = "/proc/version" -%}
{%- if os() == "linux" and proc is file -%}
  {%- set content = read_file(path="/proc/version") -%}
  {%- if content is containing("microsoft") -%}
    true
  {%- else -%}
    false
  {%- endif -%}
{%- else -%}
  false
{%- endif -%}
'''

[tasks.grant-permissions]
description = "mise/ 内のスクリプトに実行権限を付与する"
quiet = true
shell = "bash -c"
run = [
  'find ./mise/ -type f \( -name "*.sh" -o -name "*.py" \) -exec chmod +x {} +',
  'test ! -f ./notify.sh || chmod +x ./notify.sh',
]
