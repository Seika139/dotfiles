[tools]
jq = "latest"

[env]
PROFILES_DIR = "profiles"
# WSL 環境なら true になる
# exec() はバージョン間で挙動が不安定なため read_file + containing で判定する
# Tera の is テストは変数にしか使えないため set で一旦変数に入れる
# {%- -%} で空白・改行を除去して "true" / "false" のみが値になるようにする
IS_WSL = '''
{%- set proc = "/proc/version" -%}
{%- if os() == "linux" and proc is file -%}
  {%- set content = read_file(path="/proc/version") -%}
  {%- if content is containing("microsoft") -%}
    true
  {%- else -%}
    false
  {%- endif -%}
{%- else -%}
  false
{%- endif -%}
'''

[tasks.grant-permissions]
description = "mise/ 内のスクリプトに実行権限を付与して mise コマンドで実行可能にする"
quiet = true
hide = true
run = [
  "find ./mise -type f -name \"*.sh\" -exec chmod +x {} +",
  "find ./profiles -type f -name \"*.sh\" -exec chmod +x {} +",
  "test ! -f ./notify_slack.sh || chmod +x ./notify_slack.sh",
  "test ! -f ./notify_discord.sh || chmod +x ./notify_discord.sh",
  "test ! -f ./status_line.sh || chmod +x ./status_line.sh",
]

[tasks.init]
description = "dotfiles/claude の mise を初期化"
quiet = true
shell = "bash -c"
depends = ["grant-permissions"]
run = ["mise install"]

[tasks.check]
description = "指定プロファイルが存在するかを確認し、なければエラーを返す"
depends = ["check_env"]
hide = true
quiet = true
shell = "bash -c"
usage = '''
flag "--prof <prof>" help="profile name"
'''
run = """
if [ "$IS_WSL" = "true" ]; then
  DEFAULT_PROFILE="${WSL_CLAUDE_PROFILE:-}"
else
  DEFAULT_PROFILE="${DEFAULT_CLAUDE_PROFILE:-}"
fi
PROFILE="${usage_prof:-}"
PROFILE="${PROFILE:-$DEFAULT_PROFILE}"
printf "Using profile: \\033[36m%s\\033[0m\n" "$PROFILE"
if [ -z "$PROFILE" ]; then
  printf "❌ Error: DEFAULT_CLAUDE_PROFILE is not set in environment variables\n" >&2
  exit 1
fi

PROFILE_PATH="{{config_root}}/$PROFILES_DIR/$PROFILE"

if [ ! -d "$PROFILE_PATH" ]; then
  {
    printf "❌ Error: Profile directory '$PROFILE_PATH' does not exist\n"
    printf "   Available profiles:\n"
    if [ -d "{{config_root}}/$PROFILES_DIR" ]; then
      ls -1 "{{config_root}}/$PROFILES_DIR" | sed 's/^/   - /'
    else
      printf "   (No profiles directory found)\n"
    fi
  } >&2
  exit 1
fi
"""

[tasks.create_profile]
description = "新しいプロファイルを作成 (Usage: mise run create_profile <profile-name>)"
depends = ["check_env"]
shell = "bash -c"
quiet = true
usage = 'arg "[prof]" help="new profile name (defaults to DEFAULT_CLAUDE_PROFILE / WSL_CLAUDE_PROFILE)"'
run = """
if [ "$IS_WSL" = "true" ]; then
  DEFAULT_PROFILE="${WSL_CLAUDE_PROFILE:-}"
else
  DEFAULT_PROFILE="${DEFAULT_CLAUDE_PROFILE:-}"
fi
PROFILE="${usage_prof:-}"
PROFILE="${PROFILE:-$DEFAULT_PROFILE}"
if [ -z "$PROFILE" ]; then
  {
    printf "❌ Error: profile name is required.\n"
    printf "   Usage: mise run create_profile <profile-name>\n"
    printf "   Or set DEFAULT_CLAUDE_PROFILE / WSL_CLAUDE_PROFILE environment variable.\n"
  } >&2
  exit 1
fi

PROFILE_PATH="{{config_root}}/$PROFILES_DIR/$PROFILE"
if [ -d "$PROFILE_PATH" ]; then
  printf "❌ Error: Profile '$PROFILE' already exists\n" >&2
  exit 1
fi

printf "🦄 Creating new Claude profile: $PROFILE\n"
mkdir -p "$PROFILE_PATH"

# デフォルト設定ファイル作成
cat > "$PROFILE_PATH/settings.json" << 'EOF'
{
  "permissions": {
    "allow": [
      "Bash(mkdir:*)",
      "Bash(touch:*)",
      "Bash(ls:*)",
      "Bash(cat:*)"
    ],
    "deny": [
      "Bash(sudo:*)",
      "Bash(rm -rf:*)",
      "Read(.env:*)",
      "Read(**/*token*)",
      "Read(**/secrets/**)"
    ],
    "defaultMode": "acceptEdits"
  },
  "hooks": {
    "Stop": [
      {
        "matcher": "",
        "hooks": [
          {
            "type": "command",
            "command": "afplay /System/Library/Sounds/Glass.aiff"
          }
        ]
      }
    ]
  }
}
EOF

cat > "$PROFILE_PATH/settings.local.json" << 'EOF'
{}
EOF
# settings.local.json は dotfiles 内部の秘匿ストア。
# 公開リポジトリにコミットしたくないキー (非公開情報 / 絶対パス等) のみを置く。
# 詳細は claude/docs/settings-sync.md を参照。

cat > "$PROFILE_PATH/CLAUDE.md" << 'EOF'
# Claude Instructions for this Profile

## Project Context
<!-- Describe the type of projects this profile is used for -->

## Preferred Tools and Libraries
<!-- List commonly used tools, frameworks, or libraries for this environment -->

## Code Style Guidelines
<!-- Specify any coding standards or preferences -->

## Environment-Specific Notes
<!-- Add any machine-specific or environment-specific instructions -->

## Restrictions
<!-- Note any specific restrictions or security considerations -->
EOF

# NOTE: commands/ skills/ rules/ は APM 管理 (dotfiles/agents/) に移行済のため作成しない。
#   commands/skills は `mise run install`@agents/ で ~/.claude/{commands,skills}/ に、
#   rules は instructions primitive として ~/.claude/rules/<n>.md に直接配備される
#   (詳細は agents/docs/instructions-primitive.md)。

printf "%s\n" "✅ Created profile '$PROFILE' at $PROFILE_PATH"
printf "%s\n" "📝 Edit settings in:"
printf "%s\n" "   - $PROFILE_PATH/settings.json"
printf "%s\n" "   - $PROFILE_PATH/settings.local.json"
printf "%s\n" "   - $PROFILE_PATH/CLAUDE.md"
"""

[tasks.recover]
description = "~/.claude/settings.json (実ファイル) を split して dotfiles に取り込み、~/.claude/settings.json を再生成する"
depends = ["check_env"]
shell = "bash -c"
quiet = true
usage = 'flag "--prof <prof>" help="profile name" default=""'
run = '''
chmod +x "{{config_root}}/mise/scripts/recover-settings.sh"
bash "{{config_root}}/mise/scripts/recover-settings.sh" "${usage_prof:-}"
'''

[tasks.link]
description = "指定プロファイルの設定を ~/.claude/ に同期する (settings.json はマージ書き出し / 他は symlink)"
depends = ["check_env"]
shell = "bash -c"
quiet = true
usage = 'flag "--prof <prof>" help="profile name" default=""'
run = '''
chmod +x "{{config_root}}/mise/scripts/link.sh"
bash "{{config_root}}/mise/scripts/link.sh" "${usage_prof:-}"
'''

[tasks.switch]
description = "プロファイルを切り替えて ~/.claude/ を再同期する (Usage: mise run switch [--prof <profile-name>])"
depends = ["check_env"]
shell = "bash -c"
quiet = true
usage = 'flag "--prof <prof>" help="profile name"'
run = """
NEW_PROFILE="${usage_prof:-}"
if [ -z "$NEW_PROFILE" ]; then
  PROFILES_PATH="{{config_root}}/$PROFILES_DIR"
  if [ ! -d "$PROFILES_PATH" ] || [ -z "$(ls -A "$PROFILES_PATH" 2>/dev/null)" ]; then
    printf "%s\n" "❌ Error: No profiles found in $PROFILES_PATH" >&2
    exit 1
  fi
  if command -v fzf &>/dev/null && [ -t 0 ]; then
    NEW_PROFILE=$(ls -1 "$PROFILES_PATH" | fzf --prompt="Select Claude profile: " --height=~50% --reverse)
    if [ -z "$NEW_PROFILE" ]; then
      printf "%s\n" "❌ cancelled."
      exit 1
    fi
  else
    {
      printf "%s\n" "❌ Error: profile name is required."
      printf "%s\n" "   Usage: mise run switch --prof <profile-name>"
      printf "%s\n" "   Available profiles:"
      ls -1 "$PROFILES_PATH" | sed 's/^/     - /'
    } >&2
    exit 1
  fi
fi

# プロファイル存在確認
mise run check --prof "$NEW_PROFILE"

# WSL か否かに応じて mise.local.toml の適切な環境変数を更新
LOCAL_CONFIG="{{config_root}}/mise.local.toml"
if [ "$IS_WSL" = "true" ]; then
  {
    printf "%s\n" '[env]'
    printf "%s\n" "DEFAULT_CLAUDE_PROFILE = \\\"${DEFAULT_CLAUDE_PROFILE:-}\\\""
    printf "%s\n" "WSL_CLAUDE_PROFILE = \\\"$NEW_PROFILE\\\""
  } > "$LOCAL_CONFIG"
else
  {
    printf "%s\n" '[env]'
    printf "%s\n" "DEFAULT_CLAUDE_PROFILE = \\\"$NEW_PROFILE\\\""
    printf "%s\n" "WSL_CLAUDE_PROFILE = \\\"${WSL_CLAUDE_PROFILE:-}\\\""
  } > "$LOCAL_CONFIG"
fi

printf "%s\n" "🦄 Switching Claude profile to: $NEW_PROFILE"

# シンボリックリンクを更新
mise run link --prof "$NEW_PROFILE"

printf "%s\n" "✅ Switched to profile '$NEW_PROFILE'"
printf "%s\n" "🔄 Please restart your shell or run 'mise env' to reload environment variables"
"""

[tasks.list]
description = "利用可能なプロファイル一覧を表示"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
PROFILES_DIR="{{config_root}}/$PROFILES_DIR"

if [ "$IS_WSL" = "true" ]; then
  CURRENT_PROFILE="${WSL_CLAUDE_PROFILE:-}"
else
  CURRENT_PROFILE="${DEFAULT_CLAUDE_PROFILE:-}"
fi

printf "%s\n" "🦄 Available Claude Profiles:"
if [ -d "$PROFILES_DIR" ]; then
  for profile in "$PROFILES_DIR"/*; do
    if [ -d "$profile" ]; then
      profile_name=$(basename "$profile")
      if [ "$profile_name" = "$CURRENT_PROFILE" ]; then
        printf "%s\n" "   ✅ $profile_name (current)"
      else
        printf "%s\n" "   ⭕ $profile_name"
      fi
    fi
  done
else
  printf "%s\n" "   (No profiles found)"
fi

if [ -n "$CURRENT_PROFILE" ]; then
  printf "\nCurrent profile:\\033[36m %s\\033[0m\n" "$CURRENT_PROFILE"
else
  printf "%s\n" "\n⚠️ No current profile set in DEFAULT_CLAUDE_PROFILE"
fi
"""
