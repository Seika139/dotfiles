[env]
PROFILES_DIR = "profiles"
# WSL 環境なら true になる
IS_WSL = '''{% if
os() == 'linux' and exec(
  command="bash -c 'if grep -qi microsoft /proc/version 2>/dev/null || [ -n ${WSL_DISTRO_NAME:-} ]; then echo 0; else echo 1; fi'",
  allow_failure=true
) == "0" %}true{% else %}false{% endif %}'''

[tasks.check_env]
description = "環境変数がちゃんと設定されているか確認する"
quiet = true
hide = true
shell = "bash -c"
run = '''
chmod +x "{{config_root}}/mise/scripts/check_env.sh"
bash "{{config_root}}/mise/scripts/check_env.sh"
'''

[tasks.check]
description = "指定プロファイルが存在するかを確認し、なければエラーを返す"
depends = ["check_env"]
hide = true
quiet = true
shell = "bash -c"
run = """
{% if env.IS_WSL == 'true' %}
DEFAULT_PROFILE="{{ env.WSL_CLAUDE_PROFILE }}"
{% else %}
DEFAULT_PROFILE="{{ env.DEFAULT_CLAUDE_PROFILE }}"
{% endif %}
PROFILE=$([ -n "{{option(name="prof")}}" ] && echo "{{option(name="prof")}}" || echo "$DEFAULT_PROFILE")
printf "Using profile: \\033[36m%s\\033[0m\n" "$PROFILE"
if [ -z "$PROFILE" ]; then
  printf "❌ Error: DEFAULT_CLAUDE_PROFILE is not set in environment variables\n" >&2
  exit 1
fi

PROFILE_PATH="{{config_root}}/{{env.PROFILES_DIR}}/$PROFILE"

if [ ! -d "$PROFILE_PATH" ]; then
  {
    printf "❌ Error: Profile directory '$PROFILE_PATH' does not exist\n"
    printf "   Available profiles:\n"
    if [ -d "{{config_root}}/{{env.PROFILES_DIR}}" ]; then
      ls -1 "{{config_root}}/{{env.PROFILES_DIR}}" | sed 's/^/   - /'
    else
      printf "   (No profiles directory found)\n"
    fi
  } >&2
  exit 1
fi
"""

[tasks.create_profile]
description = "新しいプロファイルを作成 (Usage: mise run create_profile <profile-name>)"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
PROFILE={{arg(name="prof")}}
if [ -z "$PROFILE" ]; then
  {
    printf "❌ Error: profile name is required.\n"
    printf "   Usage: mise run create_profile <profile-name>\n"
  } >&2
  exit 1
fi

PROFILE_PATH="{{config_root}}/{{env.PROFILES_DIR}}/$PROFILE"
if [ -d "$PROFILE_PATH" ]; then
  printf "❌ Error: Profile '$PROFILE' already exists\n" >&2
  exit 1
fi

printf "🦄 Creating new Claude profile: $PROFILE\n"
mkdir -p "$PROFILE_PATH"

# デフォルト設定ファイル作成
cat > "$PROFILE_PATH/settings.json" << 'EOF'
{
  "permissions": {
    "allow": [
      "Bash(mkdir:*)",
      "Bash(touch:*)",
      "Bash(ls:*)",
      "Bash(cat:*)"
    ],
    "deny": [
      "Bash(sudo:*)",
      "Bash(rm -rf:*)",
      "Read(.env:*)",
      "Read(**/*token*)",
      "Read(**/secrets/**)"
    ],
    "defaultMode": "acceptEdits"
  },
  "hooks": {
    "Stop": [
      {
        "matcher": "",
        "hooks": [
          {
            "type": "command",
            "command": "afplay /System/Library/Sounds/Glass.aiff"
          }
        ]
      }
    ]
  }
}
EOF

cat > "$PROFILE_PATH/settings.local.json" << 'EOF'
{
  "permissions": {
    "allow": [],
    "deny": [],
    "ask": [],
    "defaultMode": "acceptEdits"
  }
}
EOF

cat > "$PROFILE_PATH/CLAUDE.md" << 'EOF'
# Claude Instructions for this Profile

## Project Context
<!-- Describe the type of projects this profile is used for -->

## Preferred Tools and Libraries
<!-- List commonly used tools, frameworks, or libraries for this environment -->

## Code Style Guidelines
<!-- Specify any coding standards or preferences -->

## Environment-Specific Notes
<!-- Add any machine-specific or environment-specific instructions -->

## Restrictions
<!-- Note any specific restrictions or security considerations -->
EOF

# commands ディレクトリ作成
mkdir -p "$PROFILE_PATH/commands"

# skills ディレクトリ作成
mkdir -p "$PROFILE_PATH/skills"

printf "%s\n" "✅ Created profile '$PROFILE' at $PROFILE_PATH"
printf "%s\n" "📝 Edit settings in:"
printf "%s\n" "   - $PROFILE_PATH/settings.json"
printf "%s\n" "   - $PROFILE_PATH/settings.local.json"
printf "%s\n" "   - $PROFILE_PATH/CLAUDE.md"
printf "%s\n" "   - $PROFILE_PATH/commands/"
printf "%s\n" "   - $PROFILE_PATH/skills/"
"""

[tasks.recover]
description = "~/.claude/settings.json が上書きされていたら変更をリポジトリに反映し symlink を復元する"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = '''
chmod +x "{{config_root}}/mise/scripts/recover-settings.sh"
bash "{{config_root}}/mise/scripts/recover-settings.sh" {{option(name="prof", default="")}}
'''

[tasks.link]
description = "指定プロファイルの設定ファイルをシンボリックリンクする"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = '''
chmod +x "{{config_root}}/mise/scripts/link.sh"
bash "{{config_root}}/mise/scripts/link.sh" {{option(name="prof", default="")}}
'''

[tasks.status]
description = "現在のプロファイル設定と~/.claudeの状態を確認"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
{% if env.IS_WSL == 'true' %}
DEFAULT_PROFILE="{{ env.WSL_CLAUDE_PROFILE }}"
{% else %}
DEFAULT_PROFILE="{{ env.DEFAULT_CLAUDE_PROFILE }}"
{% endif %}
PROFILE=$([ -n "{{option(name="prof")}}" ] && echo "{{option(name="prof")}}" || echo "$DEFAULT_PROFILE")

PROFILE_PATH="{{config_root}}/{{env.PROFILES_DIR}}/$PROFILE"

printf "%s\n" "🦄 Environment Check"
printf "os()                 =\\033[36m %s\\033[0m\n" "{{ os() }}"
printf "env.IS_WSL           =\\033[36m %s\\033[0m\n" "{{ env.IS_WSL }}"
printf "config_root          =\\033[36m %s\\033[0m\n" "{{ config_root }}"
printf "Selected profile     =\\033[36m %s\\033[0m\n" "$PROFILE"

if [ ! -d "$PROFILE_PATH" ]; then
  printf "❌ Profile directory does not exist:\\033[36m %s\\033[0m\n" "$PROFILE_PATH"
  exit 1
fi

printf "\n📂 Original files and directories:\n"
for file in settings.json settings.local.json CLAUDE.md commands skills custom-config; do
  source="$PROFILE_PATH/$file"
  if [ -f "$source" ] || [ -d "$source" ]; then
    printf "%s\n" "   ✅ $source"
  else
    printf "\\033[31m%s\\033[0m\n" "   ❌ $source (missing)"
  fi
done

printf "\n🔗 Symlinks in\\033[36m %s/.claude:\\033[0m\n" "$HOME"
for file in settings.json settings.local.json CLAUDE.md commands skills custom-config; do
  target="${HOME}/.claude/$file"
  source="$PROFILE_PATH/$file"

  if [ -L "$target" ]; then
    link_target=$(readlink "$target")
    # パスの正規化とマッチング（Windows, WSL対応）
    if [ "$link_target" = "$source" ] || [[ "$link_target" == */"${source##*/}" ]] || [[ "$link_target" == *"\\${source##*/}" ]]; then
      printf "%s\n" "   ✅ $source -> $link_target"
    else
      printf "%s\n" "   ⚠️  $source -> $link_target (不一致)"
    fi
  elif [ -f "$target" ]; then
    printf "%s\n" "   ❌ $file (通常ファイル、シンボリックリンクではない). Use the following command ↓"
    printf "\\033[36m%s\\033[0m\n" "         code '$source' '$target'"
  else
    printf "\\033[33m%s\\033[0m\n" "   ❌ $target does not exist"
  fi
done

printf "%s\n" "\n💡 Commands:"
printf "%s\n" "   リンク作成/更新: mise run link --prof \"$PROFILE\""
printf "%s\n" "   プロファイル変更: mise run switch <profile-name>"
"""

[tasks.switch]
description = "プロファイルを切り替えてシンボリックリンクを更新 (Usage: mise run switch <profile-name>)"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
NEW_PROFILE={{arg(name="prof")}}
if [ -z "$NEW_PROFILE" ]; then
  {
    printf "%s\n" "❌ Error: profile name is required."
    printf "%s\n" "   Usage: mise run switch <profile-name>\n"
    printf "%s\n" "   Available profiles:"
    if [ -d "{{config_root}}/{{env.PROFILES_DIR}}" ]; then
      ls -1 "{{config_root}}/{{env.PROFILES_DIR}}" | sed 's/^/     - /'
    fi
  } >&2
  exit 1
fi

# プロファイル存在確認
mise run check --prof "$NEW_PROFILE"

# WSL か否かに応じて mise.local.toml の適切な環境変数を更新
LOCAL_CONFIG="{{config_root}}/mise.local.toml"
{% if env.IS_WSL == 'true' %}
{
  printf "%s\n" '[env]'
  printf "%s\n" "DEFAULT_CLAUDE_PROFILE = \\\"${DEFAULT_CLAUDE_PROFILE:-}\\\""
  printf "%s\n" "WSL_CLAUDE_PROFILE = \\\"$NEW_PROFILE\\\""
} > "$LOCAL_CONFIG"
{% else %}
{
  printf "%s\n" '[env]'
  printf "%s\n" "DEFAULT_CLAUDE_PROFILE = \\\"$NEW_PROFILE\\\""
  printf "%s\n" "WSL_CLAUDE_PROFILE = \\\"${WSL_CLAUDE_PROFILE:-}\\\""
} > "$LOCAL_CONFIG"
{% endif %}

printf "%s\n" "🦄 Switching Claude profile to: $NEW_PROFILE"

# シンボリックリンクを更新
mise run link --prof "$NEW_PROFILE"

printf "%s\n" "✅ Switched to profile '$NEW_PROFILE'"
printf "%s\n" "🔄 Please restart your shell or run 'mise env' to reload environment variables"
"""

[tasks.list]
description = "利用可能なプロファイル一覧を表示"
depends = ["check_env"]
shell = "bash -c"
quiet = true
run = """
PROFILES_DIR="{{config_root}}/{{env.PROFILES_DIR}}"

{% if env.IS_WSL == 'true' %}
CURRENT_PROFILE="{{ env.WSL_CLAUDE_PROFILE }}"
{% else %}
CURRENT_PROFILE="{{ env.DEFAULT_CLAUDE_PROFILE }}"
{% endif %}

printf "%s\n" "🦄 Available Claude Profiles:"
if [ -d "$PROFILES_DIR" ]; then
  for profile in "$PROFILES_DIR"/*; do
    if [ -d "$profile" ]; then
      profile_name=$(basename "$profile")
      if [ "$profile_name" = "$CURRENT_PROFILE" ]; then
        printf "%s\n" "   ✅ $profile_name (current)"
      else
        printf "%s\n" "   ⭕ $profile_name"
      fi
    fi
  done
else
  printf "%s\n" "   (No profiles found)"
fi

if [ -n "$CURRENT_PROFILE" ]; then
  printf "\nCurrent profile:\\033[36m %s\\033[0m\n" "$CURRENT_PROFILE"
else
  printf "%s\n" "\n⚠️ No current profile set in DEFAULT_CLAUDE_PROFILE"
fi
"""
